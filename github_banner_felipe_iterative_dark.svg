<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03060B"/>
      <stop offset="0.55" stop-color="#08101A"/>
      <stop offset="1" stop-color="#0B1320"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(240 110) rotate(8) scale(340 220)">
      <stop stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1320 80) rotate(-8) scale(360 220)">
      <stop stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineMain" x1="850" y1="80" x2="1450" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#grid)"/>
  <rect width="1600" height="420" fill="url(#glow1)"/>
  <rect width="1600" height="420" fill="url(#glow2)"/>

  <!-- left minimal identity -->
  <rect x="104" y="112" width="6" height="174" rx="3" fill="#38BDF8"/>
  <text x="136" y="172" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Felipe Campello Lima</text>
  <text x="138" y="218" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500">Software Engineer</text>

  <!-- iterative graph / dashboard -->
  <g opacity="0.95">
    <rect x="884" y="78" width="584" height="264" rx="20" fill="#0B1220" stroke="#1E293B"/>
    <rect x="914" y="102" width="110" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>
    <rect x="1038" y="102" width="84" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>
    <rect x="1136" y="102" width="92" height="18" rx="9" fill="#0F172A" stroke="#1E293B"/>

    <!-- axes -->
    <line x1="930" y1="290" x2="1422" y2="290" stroke="#334155" stroke-width="1"/>
    <line x1="930" y1="136" x2="930" y2="290" stroke="#334155" stroke-width="1"/>

    <!-- grid -->
    <line x1="930" y1="250" x2="1422" y2="250" stroke="#1E293B" stroke-width="1"/>
    <line x1="930" y1="210" x2="1422" y2="210" stroke="#1E293B" stroke-width="1"/>
    <line x1="930" y1="170" x2="1422" y2="170" stroke="#1E293B" stroke-width="1"/>

    <!-- bars -->
    <rect x="964" y="232" width="36" height="58" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1030" y="210" width="36" height="80" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1096" y="182" width="36" height="108" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1162" y="194" width="36" height="96" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1228" y="158" width="36" height="132" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1294" y="136" width="36" height="154" rx="10" fill="url(#bar)" stroke="#233044"/>
    <rect x="1360" y="118" width="36" height="172" rx="10" fill="url(#bar)" stroke="#233044"/>

    <!-- main iterative curve -->
    <path d="M982 250 C1034 222, 1070 214, 1114 198 C1152 184, 1190 196, 1246 166 C1292 141, 1330 125, 1378 111"
          stroke="url(#lineMain)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

    <!-- nodes -->
    <circle cx="982" cy="250" r="5" fill="#67E8F9"/>
    <circle cx="1114" cy="198" r="5" fill="#60A5FA"/>
    <circle cx="1246" cy="166" r="5" fill="#60A5FA"/>
    <circle cx="1378" cy="111" r="6" fill="#818CF8"/>

    <!-- mini loops / iteration marks -->
    <path d="M1002 154 C1018 140, 1045 141, 1058 158 C1070 173, 1066 195, 1049 207 C1034 218, 1012 214, 999 199"
          stroke="#22D3EE" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M1185 138 C1202 123, 1229 125, 1242 142 C1253 156, 1251 176, 1235 188 C1218 201, 1195 198, 1182 182"
          stroke="#818CF8" stroke-opacity="0.45" stroke-width="2"/>

    <!-- subtle metrics dots -->
    <circle cx="1418" cy="108" r="2.5" fill="#A5B4FC"/>
    <circle cx="1418" cy="132" r="2.5" fill="#60A5FA"/>
    <circle cx="1418" cy="156" r="2.5" fill="#22D3EE"/>
  </g>

  <text x="1454" y="378" text-anchor="end" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600">github.com/Satsuj1n</text>
</svg>
